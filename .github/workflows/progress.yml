name: Progress Report

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Report version label (artifact prefix)"
        required: false
        default: "TOTK_100"

permissions:
  contents: read

env:
  VERSION: ${{ github.event.inputs.version || 'TOTK_100' }}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml protobuf cxxfilt

      - name: Generate decomp.dev report
        run: |
          python .github/scripts/decomp-dev.py --version ${{ env.VERSION }} -o report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION }}_report
          path: report.json
